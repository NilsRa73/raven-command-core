name: Build RAH Desktop Bridge (Windows)

on:
  push:
    tags: ["desktop-bridge-v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: Build Windows companion (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with: { node-version: "22" }

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-pc-windows-msvc }

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with: { workspaces: "desktop-bridge-native/src-tauri -> target" }

      - name: Bridge unit + integration tests
        working-directory: desktop-bridge
        run: node --test tests

      - name: Rust supervisor + redaction tests
        working-directory: desktop-bridge-native/src-tauri
        run: cargo test --lib --release

      - name: Prepare sidecar SEA config
        run: node desktop-bridge-native/package-sidecar.mjs

      - name: Build Node SEA sidecar (postject)
        shell: pwsh
        working-directory: desktop-bridge-native/src-tauri/binaries
        run: |
          node --experimental-sea-config sea-config.json
          Copy-Item (Get-Command node).Source rah-bridge-sidecar-x86_64-pc-windows-msvc.exe
          npx --yes postject rah-bridge-sidecar-x86_64-pc-windows-msvc.exe NODE_SEA_BLOB sea-prep.blob `
            --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Generate app icons from brand mark
        shell: pwsh
        working-directory: desktop-bridge-native/src-tauri
        run: |
          cargo tauri icon ..\..\src\assets\raven-mark.svg -o icons
          Copy-Item icons\128x128.png icons\tray.png -Force

      - name: Build Tauri Windows installer
        working-directory: desktop-bridge-native/src-tauri
        run: cargo tauri build --target x86_64-pc-windows-msvc --bundles nsis

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Get-ChildItem -Recurse -Path desktop-bridge-native/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis -Filter *.exe |
            ForEach-Object { Copy-Item $_.FullName "dist/rah-desktop-bridge-0.2.0-x64.exe" -Force }
          Copy-Item desktop-bridge-native/src-tauri/binaries/rah-bridge-sidecar-x86_64-pc-windows-msvc.exe dist/ -Force
          $lines = @()
          Get-ChildItem dist | ForEach-Object {
            $h = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            $lines += "$h  $($_.Name)"
          }
          $lines | Out-File -Encoding ascii dist/SHA256SUMS.txt

      - name: Copy installer into public/ for manifest build
        shell: pwsh
        run: Copy-Item dist/rah-desktop-bridge-0.2.0-x64.exe public/ -Force

      - name: Regenerate release manifest
        run: node scripts/build-release-manifest.mjs

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rah-desktop-bridge-windows-0.2.0
          path: |
            dist/
            src/lib/rah/bridge-manifest.json
          if-no-files-found: error

      - name: Create GitHub Release (draft, tag builds only)
        if: startsWith(github.ref, 'refs/tags/desktop-bridge-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/rah-desktop-bridge-0.2.0-x64.exe
            dist/rah-bridge-sidecar-x86_64-pc-windows-msvc.exe
            dist/SHA256SUMS.txt
          draft: true
          generate_release_notes: true