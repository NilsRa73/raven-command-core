name: Build RAH Desktop Bridge (Windows)

on:
  push:
    tags: ["desktop-bridge-v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: Build Windows companion (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with: { node-version: "22" }

      - name: Install bun (used by the repo)
        uses: oven-sh/setup-bun@v2

      - name: Install repo deps (esbuild + bridge deps)
        run: bun install --frozen-lockfile

      - name: Bridge unit + integration tests (49)
        working-directory: desktop-bridge
        shell: pwsh
        run: node --test tests/*.test.js

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with: { workspaces: "desktop-bridge-native/src-tauri -> target" }

      - name: Rust fmt check
        working-directory: desktop-bridge-native/src-tauri
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Rust unit tests (supervisor + redact + pairing + healthcheck)
        working-directory: desktop-bridge-native/src-tauri
        run: cargo test --lib --release

      - name: Rust clippy (lib only)
        working-directory: desktop-bridge-native/src-tauri
        run: cargo clippy --lib --release -- -D warnings
        continue-on-error: true

      - name: Bundle sidecar (esbuild -> CJS -> SEA config)
        run: node desktop-bridge-native/package-sidecar.mjs

      - name: Build Node SEA sidecar + postject
        shell: pwsh
        working-directory: desktop-bridge-native/src-tauri/binaries
        run: |
          node --experimental-sea-config sea-config.json
          if (-not (Test-Path sea-prep.blob)) { throw "SEA blob missing" }
          Copy-Item (Get-Command node).Source rah-bridge-sidecar-x86_64-pc-windows-msvc.exe
          npx --yes postject rah-bridge-sidecar-x86_64-pc-windows-msvc.exe NODE_SEA_BLOB sea-prep.blob `
            --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2
          $exe = "rah-bridge-sidecar-x86_64-pc-windows-msvc.exe"
          if (-not (Test-Path $exe)) { throw "sidecar exe missing" }
          if ((Get-Item $exe).Length -lt 20000000) { throw "sidecar exe suspiciously small ($((Get-Item $exe).Length) bytes)" }

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Generate app icons from repo-owned SVG
        shell: pwsh
        working-directory: desktop-bridge-native/src-tauri
        run: |
          cargo tauri icon ../assets/raven-mark.svg -o icons
          Copy-Item icons/128x128.png icons/tray.png -Force

      - name: Build Tauri Windows installer (NSIS)
        working-directory: desktop-bridge-native/src-tauri
        run: cargo tauri build --target x86_64-pc-windows-msvc --bundles nsis

      - name: Verify + collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $installers = Get-ChildItem -Recurse -Path desktop-bridge-native/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis -Filter *.exe
          if ($installers.Count -eq 0) { throw "no installer produced" }
          Copy-Item $installers[0].FullName "dist/rah-desktop-bridge-0.2.1-x64.exe" -Force
          Copy-Item desktop-bridge-native/src-tauri/binaries/rah-bridge-sidecar-x86_64-pc-windows-msvc.exe dist/ -Force
          $lines = @()
          Get-ChildItem dist | ForEach-Object {
            $h = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            $lines += "$h  $($_.Name)"
          }
          $lines | Out-File -Encoding ascii dist/SHA256SUMS.txt

      - name: Stage installer for manifest build
        shell: pwsh
        run: Copy-Item dist/rah-desktop-bridge-0.2.1-x64.exe public/ -Force

      - name: Regenerate release manifest
        run: node scripts/build-release-manifest.mjs

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rah-desktop-bridge-windows-0.2.1
          path: |
            dist/
            src/lib/rah/bridge-manifest.json
          if-no-files-found: error

      - name: Create draft GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/desktop-bridge-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/rah-desktop-bridge-0.2.1-x64.exe
            dist/rah-bridge-sidecar-x86_64-pc-windows-msvc.exe
            dist/SHA256SUMS.txt
          draft: true
          generate_release_notes: true