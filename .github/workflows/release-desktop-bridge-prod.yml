name: Build RAH Desktop Bridge — Production (signed)

# Production release. REQUIRES all signing secrets. Fails hard if any
# are missing. Does NOT publish a GitHub Release automatically — it
# stages a draft that a human must review and publish manually.

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        default: "stable"
        type: choice
        options: [stable, beta]
  push:
    tags: ["desktop-bridge-v*"]

permissions:
  contents: write

jobs:
  prod-build:
    name: Signed installer + updater manifest (windows-x86_64)
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_UPDATER_PUBKEY:               ${{ secrets.TAURI_UPDATER_PUBKEY }}
      WINDOWS_CERTIFICATE:                ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD:       ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      RELEASE_BASE_URL:                   ${{ secrets.RELEASE_BASE_URL }}
      RELEASE_SIGNATURE:                  ${{ secrets.RELEASE_SIGNATURE }}
      RELEASE_KEY_ID:                     ${{ secrets.RELEASE_KEY_ID }}
      RELEASE_CHANNEL:                    ${{ inputs.channel || 'stable' }}
    steps:
      - uses: actions/checkout@v4

      - name: Fail fast if any required secret is missing
        shell: pwsh
        run: |
          $required = @(
            "TAURI_SIGNING_PRIVATE_KEY","TAURI_SIGNING_PRIVATE_KEY_PASSWORD",
            "TAURI_UPDATER_PUBKEY","WINDOWS_CERTIFICATE","WINDOWS_CERTIFICATE_PASSWORD",
            "RELEASE_BASE_URL","RELEASE_SIGNATURE","RELEASE_KEY_ID"
          )
          $missing = @()
          foreach ($v in $required) { if (-not (Test-Path env:$v) -or [string]::IsNullOrEmpty((Get-Item env:$v).Value)) { $missing += $v } }
          if ($missing.Count -gt 0) { throw "Missing required secrets: $($missing -join ', ')" }

      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Full bridge test suite
        working-directory: desktop-bridge
        run: node --test tests/*.test.js

      - name: Merge updater config into tauri.conf.json (secret-gated)
        shell: pwsh
        working-directory: desktop-bridge-native/src-tauri
        run: |
          $conf = Get-Content tauri.conf.json -Raw | ConvertFrom-Json
          $tmpl = Get-Content tauri.updater.template.json -Raw | ConvertFrom-Json
          $tmpl.plugins.updater.pubkey = $env:TAURI_UPDATER_PUBKEY
          $tmpl.plugins.updater.endpoints = @("$env:RELEASE_BASE_URL/latest.json")
          if (-not $conf.plugins) { $conf | Add-Member -NotePropertyName plugins -NotePropertyValue (New-Object PSObject) }
          $conf.plugins | Add-Member -NotePropertyName updater -NotePropertyValue $tmpl.plugins.updater -Force
          $conf | ConvertTo-Json -Depth 20 | Set-Content tauri.conf.json -Encoding utf8
          Copy-Item capabilities/updater.template.json capabilities/updater.json -Force

      - name: Release preflight (must PASS)
        run: node scripts/release-preflight.mjs

      - name: Bundle sidecar
        run: node desktop-bridge-native/package-sidecar.mjs

      - uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-pc-windows-msvc }
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: "desktop-bridge-native/src-tauri -> target" }

      - name: Rust unit tests
        working-directory: desktop-bridge-native/src-tauri
        run: cargo test --lib --release

      - name: Build SEA sidecar exe
        shell: pwsh
        working-directory: desktop-bridge-native/src-tauri/binaries
        run: |
          node --experimental-sea-config sea-config.json
          Copy-Item (Get-Command node).Source rah-bridge-sidecar-x86_64-pc-windows-msvc.exe
          npx --yes postject rah-bridge-sidecar-x86_64-pc-windows-msvc.exe NODE_SEA_BLOB sea-prep.blob `
            --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2

      - name: Build + sign Tauri installer
        working-directory: desktop-bridge-native/src-tauri
        run: cargo tauri build --target x86_64-pc-windows-msvc --bundles nsis

      - name: Stage installer + generate updater manifest
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist,public | Out-Null
          $exe = Get-ChildItem -Recurse desktop-bridge-native/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis -Filter *.exe | Select-Object -First 1
          if (-not $exe) { throw "no installer produced" }
          $ver = (Get-Content desktop-bridge-native/src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $dest = "rah-desktop-bridge-$ver-x64.exe"
          Copy-Item $exe.FullName "dist/$dest" -Force
          Copy-Item "dist/$dest" "public/$dest" -Force
          Copy-Item desktop-bridge-native/src-tauri/binaries/rah-bridge-sidecar-x86_64-pc-windows-msvc.exe dist/ -Force
          Get-ChildItem dist -File | ForEach-Object {
            "$((Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower())  $($_.Name)"
          } | Out-File -Encoding ascii dist/SHA256SUMS.txt

      - name: Build updater manifest (must PASS)
        run: node scripts/build-updater-manifest.mjs

      - uses: actions/upload-artifact@v4
        with:
          name: rah-desktop-bridge-prod-signed
          path: |
            dist/
            public/updater-manifest.json
            public/latest.json
          if-no-files-found: error

      - name: Create DRAFT GitHub release (never auto-publishes)
        if: startsWith(github.ref, 'refs/tags/desktop-bridge-v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/**/*
            public/latest.json
            public/updater-manifest.json